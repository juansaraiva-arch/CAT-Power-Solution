# render.yaml — Render Blueprint
# CAT Power Solution — Beta Deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cat-power-solution
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: REQUIRE_AUTH
        value: "false"
      - key: ENABLE_DB_PERSISTENCE
        value: "false"
      - key: ENABLE_PDF_GENERATION
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /api/v1/health
